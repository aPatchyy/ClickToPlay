<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ClickToPlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="overlay-container">
      <div id="instruction-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <circle cx="50%" cy="50%" r="42" fill="none" stroke="var(--primary-color)" stroke-width="8"/>
          <rect x="46" y="22" width="8" height="40" fill="var(--primary-color)"/>
          <rect x="46" y="69" width="8" height="8" fill="var(--primary-color)"/>
        </svg>
        <div>
          <span>To improve viewer engagement, this advertisement will pause without frequent interaction. Click the video to continue playing.</span>
          <a href="#">Learn More</a>
        </div>
      </div>
       <div id="fail-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <circle cx="50%" cy="50%" r="42" fill="none" stroke="var(--primary-color)" stroke-width="8"/>
          <rect x="46" y="22" width="8" height="40" fill="var(--primary-color)"/>
          <rect x="46" y="69" width="8" height="8" fill="var(--primary-color)"/>
        </svg>
        <div>
          <span>No interaction detected. Redirecting...</span>
        </div>
      </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
